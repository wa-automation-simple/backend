version: '3.8'

services:
  # Databases - Each service has its own database
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  whatsapp-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: whatsapp_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - whatsapp-db-data:/var/lib/postgresql/data

  blast-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: blast_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - blast-db-data:/var/lib/postgresql/data

  ai-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ai-db-data:/var/lib/postgresql/data

  payment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  followup-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: followup_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - followup-db-data:/var/lib/postgresql/data

  scheduler-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scheduler_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - scheduler-db-data:/var/lib/postgresql/data

  # API Gateway
  gateway:
    build: .
    command: python gateway/main.py
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth_service_db
    depends_on:
      - auth-db
    volumes:
      - ./shared:/app/shared

  # Auth Service
  auth-service:
    build: .
    command: python auth-service/main.py
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth_service_db
    depends_on:
      - auth-db
    volumes:
      - ./shared:/app/shared
      - ./auth-service:/app/auth-service

  # WhatsApp Service
  whatsapp-service:
    build: .
    command: python whatsapp-service/main.py
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@whatsapp-db:5432/whatsapp_service_db
    depends_on:
      - whatsapp-db
    volumes:
      - ./shared:/app/shared
      - ./whatsapp-service:/app/whatsapp-service

  # Blast Service
  blast-service:
    build: .
    command: python blast-service/main.py
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@blast-db:5432/blast_service_db
    depends_on:
      - blast-db
    volumes:
      - ./shared:/app/shared
      - ./blast-service:/app/blast-service

  # AI Service
  ai-service:
    build: .
    command: python ai-service/main.py
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@ai-db:5432/ai_service_db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - ai-db
    volumes:
      - ./shared:/app/shared
      - ./ai-service:/app/ai-service

  # Payment Service
  payment-service:
    build: .
    command: python payment-service/main.py
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@payment-db:5432/payment_service_db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    depends_on:
      - payment-db
    volumes:
      - ./shared:/app/shared
      - ./payment-service:/app/payment-service

  # Follow-up Service
  followup-service:
    build: .
    command: python followup-service/main.py
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@followup-db:5432/followup_service_db
    depends_on:
      - followup-db
    volumes:
      - ./shared:/app/shared
      - ./followup-service:/app/followup-service

  # Scheduler Service
  scheduler-service:
    build: .
    command: python scheduler-service/main.py
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@scheduler-db:5432/scheduler_service_db
    depends_on:
      - scheduler-db
    volumes:
      - ./shared:/app/shared
      - ./scheduler-service:/app/scheduler-service

volumes:
  auth-db-data:
  whatsapp-db-data:
  blast-db-data:
  ai-db-data:
  payment-db-data:
  followup-db-data:
  scheduler-db-data:
